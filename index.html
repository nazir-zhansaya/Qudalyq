<!DOCTYPE html>
<html lang="kk">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Нәзір & Жансая — Той Шақыру</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    min-height: 100%;
    background: #fff;
    overflow-x: hidden;
  }
  .wrap {
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
    position: relative;
    display: block;
  }
  .wrap img {
    width: 100%;
    height: auto;
    display: block;
  }
  .map-btn {
    position: absolute;
    bottom: 10.2%;
    left: 50%;
    transform: translateX(-50%);
    width: 70px;
    height: 70px;
  }
</style>
</head>
<body>
  <div class="wrap">
    <img src="image2.jpg" alt="">
    <a class="map-btn"
       href="https://2gis.kz/almaty/geo/70030076929760544/76.779821,43.167789"
       target="_blank">
    </a>
  </div>
</body>
